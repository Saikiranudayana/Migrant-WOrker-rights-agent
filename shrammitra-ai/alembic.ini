# Alembic configuration for ShramMitra AI
# Generated by alembic init; do not edit manually unless needed.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os  # Use os.pathsep separator

# Use asyncpg via environment variable at runtime
# Set ALEMBIC_DATABASE_URL or DATABASE_URL before running migrations
sqlalchemy.url = %(DATABASE_URL)s

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
