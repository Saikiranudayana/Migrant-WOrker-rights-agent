name: Deploy

on:
  push:
    branches:
      - main        # → staging
      - production  # → production
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, production]

env:
  AWS_REGION: us-east-1
  ECR_BACKEND_REPO: shrammitra/backend
  ECR_FRONTEND_REPO: shrammitra/frontend

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_BACKEND_REPO }}:${{ steps.tag.outputs.tag }} backend/
          docker push ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_BACKEND_REPO }}:${{ steps.tag.outputs.tag }}

      - name: Build & push frontend
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_FRONTEND_REPO }}:${{ steps.tag.outputs.tag }} frontend/
          docker push ${{ secrets.ECR_REGISTRY }}/${{ env.ECR_FRONTEND_REPO }}:${{ steps.tag.outputs.tag }}

  deploy-staging:
    name: Deploy to staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 (staging)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ec2-user
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/shrammitra
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            docker compose pull
            docker compose up -d --no-build
            docker compose ps

  deploy-production:
    name: Deploy to production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/production' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 (production)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ec2-user
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/shrammitra
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            docker compose pull
            docker compose up -d --no-build
            docker compose ps

      - name: Smoke test production health endpoint
        run: |
          sleep 15
          curl -f https://${{ secrets.PROD_DOMAIN }}/health
